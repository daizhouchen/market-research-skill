# ============================================================
# 市场调研 - 分析维度定义
# ============================================================
# 每个维度包含：
#   label          - 维度中文名称
#   questions      - 该维度要回答的核心问题列表
#   primary        - 首选数据源（优先使用）
#   secondary      - 备选数据源（首选不可用时使用）
#   fallback_queries - 回退到网页搜索时使用的查询模板
#                      支持占位符：{keyword} = 调研关键词，{year} = 当前年份
# ============================================================

dimensions:

  trend_analysis:
    label: "市场趋势分析"
    questions:
      - "该市场/品类近年的增长或下降趋势如何？"
      - "是否存在明显的季节性波动？"
      - "有哪些值得关注的机会关键词正在崛起？"
      - "搜索热度的地域分布有何特点？"
    primary:
      - google_trends
    secondary:
      - similarweb
    fallback_queries:
      - "{keyword} market trend {year}"
      - "{keyword} growth rate {year}"
      - "{keyword} seasonal trend analysis"
      - "{keyword} emerging opportunity keywords {year}"

  product_competition:
    label: "产品竞争格局"
    questions:
      - "当前市场上有哪些主要竞品？"
      - "各竞品的定价策略如何？"
      - "用户对各竞品的评分和评价如何？"
      - "市场中是否存在明显的产品空白或未满足的需求？"
    primary:
      - amazon
      - app_store
      - google_play
    secondary:
      - producthunt
    fallback_queries:
      - "{keyword} best products comparison {year}"
      - "{keyword} price comparison review {year}"
      - "{keyword} top rated products {year}"
      - "{keyword} market gaps unmet needs {year}"

  user_demand:
    label: "用户需求与痛点"
    questions:
      - "用户最核心的需求是什么？"
      - "用户反复提及的痛点有哪些？"
      - "用户最希望改进或新增的功能是什么？"
      - "不同用户群体的需求有何差异？"
    primary:
      - reddit
    secondary:
      - amazon
      - app_store
      - google_play
    fallback_queries:
      - "{keyword} user complaints pain points {year}"
      - "{keyword} what users want reddit {year}"
      - "{keyword} feature requests wishlist {year}"
      - "{keyword} user reviews common issues {year}"

  competitor_landscape:
    label: "竞品公司分析"
    questions:
      - "该领域有哪些主要公司和团队？"
      - "各公司的融资情况和发展阶段如何？"
      - "近期是否有值得关注的新进入者？"
      - "头部公司的核心竞争优势是什么？"
    primary:
      - crunchbase
    secondary:
      - producthunt
      - similarweb
    fallback_queries:
      - "{keyword} top companies funding {year}"
      - "{keyword} startup landscape {year}"
      - "{keyword} new entrants competitors {year}"
      - "{keyword} company analysis market share {year}"

  # ============================================================
  # 深度分析维度（v2 新增）
  # ============================================================

  market_sizing:
    label: "市场规模估算"
    questions:
      - "该市场的 TAM（总可寻址市场）大概多大？"
      - "SAM（可服务市场）和 SOM（可获得市场）分别是什么量级？"
      - "市场增长率（CAGR）是多少？"
      - "市场处于生命周期的哪个阶段（萌芽/成长/成熟/衰退）？"
      - "主要细分市场各自的规模占比如何？"
    primary: []  # 无直接 API，主要依赖 web search + 推算
    secondary:
      - google_trends
      - crunchbase
    fallback_queries:
      - "{keyword} market size {year}"
      - "{keyword} TAM SAM SOM analysis"
      - "{keyword} market forecast CAGR {year}"
      - "{keyword} industry report market value"
      - "{keyword} market segmentation revenue"
      - "site:statista.com {keyword} market size"
      - "site:grandviewresearch.com {keyword}"
      - "{keyword} market research report {year} PDF"

  technology_innovation:
    label: "技术创新与壁垒分析"
    questions:
      - "该领域的核心技术栈和技术趋势是什么？"
      - "有没有新兴技术正在颠覆现有格局？"
      - "技术壁垒有多高？（专利、核心算法、数据壁垒）"
      - "开源社区活跃度如何？（GitHub 项目、Star 增长）"
      - "相关技术人才的供需状况如何？"
      - "技术采纳生命周期处于哪个阶段？（创新者→早期采用→早期多数→...）"
    primary: []
    secondary:
      - google_trends
      - crunchbase
    fallback_queries:
      - "{keyword} technology stack architecture {year}"
      - "{keyword} patents filed {year}"
      - "{keyword} open source github trending"
      - "{keyword} technical challenges barriers"
      - "{keyword} AI ML technology disruption {year}"
      - "site:github.com {keyword} stars"
      - "{keyword} developer tools SDK API"
      - "{keyword} technology adoption curve {year}"

  supply_demand_signals:
    label: "供需先行信号分析"
    questions:
      - "该领域的招聘趋势如何？（招聘量是市场热度的领先指标）"
      - "相关岗位的薪资水平和变化趋势？"
      - "供应链上下游有什么变化信号？"
      - "广告投放量和获客成本趋势如何？"
      - "相关行业会议和活动的热度变化？"
      - "YouTube/社交媒体上的内容创作者关注度变化？"
    primary: []
    secondary:
      - google_trends
    fallback_queries:
      - "{keyword} jobs hiring {year} site:linkedin.com"
      - "{keyword} salary trends {year}"
      - "{keyword} supply chain analysis {year}"
      - "{keyword} customer acquisition cost CAC"
      - "{keyword} industry conference events {year}"
      - "{keyword} YouTube channels growing {year}"
      - "{keyword} advertising spend market {year}"
      - "{keyword} import export trade data {year}"

  user_journey_deep:
    label: "用户深度洞察（JTBD + 旅程分析）"
    questions:
      - "用户在'雇佣'这个产品完成什么任务？（Jobs-to-be-Done）"
      - "用户的决策旅程是什么？（发现→评估→购买→使用→复购/流失）"
      - "每个旅程阶段的关键触点和痛点是什么？"
      - "用户愿意为哪些价值点付费？付费意愿的上限在哪？"
      - "用户的替代方案是什么？（不只是竞品，还包括 DIY、不解决等）"
      - "超级用户和普通用户的行为差异是什么？"
    primary:
      - reddit
    secondary:
      - amazon
      - app_store
      - google_play
    fallback_queries:
      - "{keyword} user journey customer experience"
      - "{keyword} why users switch alternatives"
      - "{keyword} willingness to pay pricing survey"
      - "{keyword} power user vs casual user"
      - "{keyword} jobs to be done JTBD"
      - "{keyword} customer decision process"
      - "{keyword} user retention churn reasons"
