<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}} — 市场调研报告</title>
<style>
/* ============================================================
   Market Research Report — Embedded Stylesheet
   Design: Deep blue primary + light gray bg + white cards
   ============================================================ */

:root {
  --primary: #1a365d;
  --primary-light: #2b6cb0;
  --primary-lighter: #ebf4ff;
  --accent: #ed8936;
  --accent-light: #fefcbf;
  --success: #38a169;
  --warning: #d69e2e;
  --danger: #e53e3e;
  --gray-50: #f7fafc;
  --gray-100: #edf2f7;
  --gray-200: #e2e8f0;
  --gray-300: #cbd5e0;
  --gray-500: #718096;
  --gray-700: #4a5568;
  --gray-800: #2d3748;
  --gray-900: #1a202c;
  --white: #ffffff;
  --shadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,0.07), 0 2px 4px rgba(0,0,0,0.06);
  --radius: 8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  font-size: 15px;
  line-height: 1.7;
  color: var(--gray-800);
  background: var(--gray-100);
}

/* ---------- Layout ---------- */

.page-wrapper {
  display: flex;
  min-height: 100vh;
}

/* Sidebar TOC */
.sidebar {
  position: fixed;
  top: 0; left: 0;
  width: 260px;
  height: 100vh;
  overflow-y: auto;
  background: var(--primary);
  color: var(--white);
  padding: 24px 0;
  z-index: 100;
}

.sidebar-header {
  padding: 0 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.15);
  margin-bottom: 12px;
}

.sidebar-header h2 {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.5px;
  opacity: 0.9;
}

.sidebar-header .report-meta {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 6px;
}

.sidebar nav a {
  display: block;
  padding: 8px 20px;
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  font-size: 13px;
  transition: all 0.15s;
  border-left: 3px solid transparent;
}

.sidebar nav a:hover,
.sidebar nav a.active {
  color: var(--white);
  background: rgba(255,255,255,0.08);
  border-left-color: var(--accent);
}

.sidebar nav a.toc-h2 { padding-left: 20px; font-weight: 600; }
.sidebar nav a.toc-h3 { padding-left: 36px; font-size: 12px; }

/* Main Content */
.main-content {
  margin-left: 260px;
  flex: 1;
  padding: 32px 40px 80px;
  max-width: 960px;
}

/* ---------- Typography ---------- */

.main-content h1 {
  font-size: 28px;
  font-weight: 700;
  color: var(--primary);
  margin: 0 0 8px;
  padding-bottom: 12px;
  border-bottom: 3px solid var(--primary);
}

.main-content h2 {
  font-size: 22px;
  font-weight: 700;
  color: var(--primary);
  margin: 48px 0 16px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--gray-200);
  scroll-margin-top: 20px;
}

.main-content h3 {
  font-size: 17px;
  font-weight: 600;
  color: var(--gray-800);
  margin: 32px 0 12px;
  scroll-margin-top: 20px;
}

.main-content h4 {
  font-size: 15px;
  font-weight: 600;
  color: var(--gray-700);
  margin: 24px 0 8px;
}

.main-content p {
  margin: 0 0 14px;
}

.main-content ul, .main-content ol {
  margin: 0 0 14px;
  padding-left: 24px;
}

.main-content li { margin-bottom: 6px; }

.main-content strong { color: var(--gray-900); }

.main-content hr {
  border: none;
  border-top: 1px solid var(--gray-200);
  margin: 32px 0;
}

/* Blockquotes — used for metadata header */
.main-content blockquote {
  background: var(--primary-lighter);
  border-left: 4px solid var(--primary-light);
  padding: 16px 20px;
  margin: 0 0 24px;
  border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 14px;
  color: var(--gray-700);
}

.main-content blockquote p { margin: 4px 0; }

/* Inline code */
.main-content code {
  background: var(--gray-100);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
  font-family: "SF Mono", "Fira Code", Consolas, monospace;
}

/* Code blocks */
.main-content pre {
  background: var(--gray-900);
  color: #e2e8f0;
  padding: 16px 20px;
  border-radius: var(--radius);
  overflow-x: auto;
  margin: 0 0 16px;
  font-size: 13px;
  line-height: 1.6;
}

.main-content pre code {
  background: none;
  padding: 0;
  color: inherit;
}

/* ---------- Tables ---------- */

.main-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 0 0 20px;
  background: var(--white);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  font-size: 14px;
}

.main-content thead th {
  background: var(--primary);
  color: var(--white);
  font-weight: 600;
  padding: 12px 16px;
  text-align: left;
  white-space: nowrap;
}

.main-content tbody td {
  padding: 10px 16px;
  border-bottom: 1px solid var(--gray-100);
  vertical-align: top;
}

.main-content tbody tr:nth-child(even) { background: var(--gray-50); }
.main-content tbody tr:hover { background: var(--primary-lighter); }

.main-content tbody tr:last-child td { border-bottom: none; }

/* ---------- Card Sections ---------- */

.main-content > h2 + *,
.main-content > h2 + * ~ *:not(h2):not(h1) {
  /* Wrap content blocks visually */
}

/* ---------- Confidence Badges ---------- */

/* Make emoji indicators more visible */

/* ---------- Footer ---------- */

.report-footer {
  margin-top: 48px;
  padding-top: 24px;
  border-top: 2px solid var(--gray-200);
  font-size: 13px;
  color: var(--gray-500);
  text-align: center;
  line-height: 1.8;
}

/* ---------- Responsive ---------- */

@media (max-width: 900px) {
  .sidebar { display: none; }
  .main-content { margin-left: 0; padding: 20px 16px 60px; }
}

/* ---------- Print Styles ---------- */

@media print {
  .sidebar { display: none !important; }

  .main-content {
    margin-left: 0 !important;
    padding: 0 !important;
    max-width: 100% !important;
  }

  body {
    background: white !important;
    font-size: 12px !important;
    line-height: 1.5 !important;
  }

  .main-content h1 { font-size: 22px; }
  .main-content h2 { font-size: 17px; break-before: page; margin-top: 0; }
  .main-content h2:first-of-type { break-before: auto; }
  .main-content h3 { font-size: 14px; }

  .main-content table {
    box-shadow: none;
    font-size: 11px;
    break-inside: avoid;
  }

  .main-content thead th {
    background: var(--gray-200) !important;
    color: var(--gray-900) !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .main-content tbody tr:nth-child(even) {
    background: var(--gray-50) !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .main-content blockquote {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .report-footer { break-before: auto; }

  a { color: inherit !important; text-decoration: none !important; }
}
</style>
</head>
<body>

<div class="page-wrapper">

  <!-- Sidebar TOC — auto-generated by JS -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>{{title}}</h2>
      <div class="report-meta">市场调研报告<br>{{date}}</div>
    </div>
    <nav id="toc-nav"></nav>
  </aside>

  <!-- Main Report Content -->
  <main class="main-content" id="report-content">
{{content}}
    <div class="report-footer">
      <p>本报告由 Market Research Skill 自动生成 | 数据采集时间截至 {{date}}</p>
      <p>报告中的分析结论基于公开数据，仅供参考，不构成商业决策的唯一依据。</p>
    </div>
  </main>

</div>

<!-- Auto-generate TOC from headings -->
<script>
(function() {
  var content = document.getElementById('report-content');
  var nav = document.getElementById('toc-nav');
  var headings = content.querySelectorAll('h1, h2, h3');
  var html = '';

  headings.forEach(function(h, i) {
    var id = 'section-' + i;
    h.id = id;
    var level = h.tagName.toLowerCase();
    if (level === 'h1') return; // skip page title
    var cls = level === 'h2' ? 'toc-h2' : 'toc-h3';
    html += '<a href="#' + id + '" class="' + cls + '">' + h.textContent + '</a>';
  });

  nav.innerHTML = html;

  // Scroll spy
  var links = nav.querySelectorAll('a');
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        links.forEach(function(l) { l.classList.remove('active'); });
        var active = nav.querySelector('a[href="#' + entry.target.id + '"]');
        if (active) active.classList.add('active');
      }
    });
  }, { rootMargin: '-20% 0px -70% 0px' });

  headings.forEach(function(h) { if (h.tagName !== 'H1') observer.observe(h); });
})();
</script>

</body>
</html>
